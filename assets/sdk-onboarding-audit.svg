  <text x="94" y="226" fill="#A7B0BE" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="450" letter-spacing="0">Clean-env developer journey verification for SDK launches, quickstarts, CLIs, and agent skills.</text>
