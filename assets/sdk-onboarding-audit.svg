  <defs>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#704cff" stop-opacity="0"/>
      <stop offset="25%" stop-color="#ff4d98" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#704cff" stop-opacity="0.8"/>
      <stop offset="75%" stop-color="#19d3b0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a8dff" stop-opacity="0"/>
    </linearGradient>
    <style>
      @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes pulse-pink {
        0%,100% { fill: #ff4d98; opacity: 0.75; filter: drop-shadow(0 0 2px rgba(255, 77, 152, 0.4)); }
        50% { fill: #ff4d98; opacity: 1; filter: drop-shadow(0 0 10px rgba(255, 77, 152, 0.9)); }
      }
      @keyframes pulse-purple {
        0%,100% { fill: #704cff; opacity: 0.75; filter: drop-shadow(0 0 2px rgba(112, 76, 255, 0.4)); }
        50% { fill: #704cff; opacity: 1; filter: drop-shadow(0 0 10px rgba(112, 76, 255, 0.9)); }
      }
      @keyframes pulse-teal {
        0%,100% { fill: #19d3b0; opacity: 0.75; filter: drop-shadow(0 0 2px rgba(25, 211, 176, 0.4)); }
        50% { fill: #19d3b0; opacity: 1; filter: drop-shadow(0 0 10px rgba(25, 211, 176, 0.9)); }
      }
      @keyframes pulse-blue {
        0%,100% { fill: #4a8dff; opacity: 0.75; filter: drop-shadow(0 0 2px rgba(74, 141, 255, 0.4)); }
        50% { fill: #4a8dff; opacity: 1; filter: drop-shadow(0 0 10px rgba(74, 141, 255, 0.9)); }
      }
      @keyframes spark { 0%,100% { opacity: 0.05; transform: translateY(0px); } 50% { opacity: 0.8; transform: translateY(-4px); } }
      .cursor { animation: blink 1s step-end infinite; }
      .lt-pink { animation: pulse-pink 2.4s ease-in-out infinite; }
      .lt-purple { animation: pulse-purple 2.4s ease-in-out infinite; }
      .lt-teal { animation: pulse-teal 2.4s ease-in-out infinite; }
      .lt-blue { animation: pulse-blue 2.4s ease-in-out infinite; }
      .spark { opacity: 0.05; animation: spark 3.5s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="1000" height="360" rx="16" fill="#070913"/>
  <rect width="1000" height="360" rx="16" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

